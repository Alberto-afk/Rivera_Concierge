<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diego Gravity</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #030303;
            --text-main: #ffffff;
            --text-dim: #888888;
            --glass-bg: rgba(10, 10, 15, 0.35);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-gold: #D4AF37;
            --accent-gold-light: #F5E6CC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        /* Prevent all zooming and dragging on mobile */
        body, html {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -ms-touch-action: manipulation;
        }

        /* ===== VIDEO BACKGROUND ===== */
        #video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: -1;
            pointer-events: none;
        }

        /* Dark overlay on video for readability */
        .video-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
            pointer-events: none;
        }

        /* ===== VOLUME CONTROL (LEFT SIDE) ===== */
        .volume-control {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .volume-control.visible {
            opacity: 1;
        }

        .volume-btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .volume-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .volume-slider-wrap {
            width: 36px;
            height: 120px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            writing-mode: vertical-lr;
            direction: rtl;
            width: 4px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px; height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 14px; height: 14px;
            background: #fff;
            border-radius: 50%;
            border: none;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            cursor: pointer;
        }

        /* ===== ENTRY SCREEN ===== */
        #entry-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 500;
            cursor: pointer;
            transition: transform 1.2s cubic-bezier(0.86, 0, 0.07, 1), opacity 1.2s;
        }

        #entry-screen.open {
            transform: scale(1.5) translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .enter-title {
            font-size: 4rem;
            font-weight: 200;
            letter-spacing: 20px;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            background: linear-gradient(90deg, #fff, var(--accent-gold), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textShine 4s linear infinite;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        .enter-desc {
            margin-top: 1rem;
            font-size: 0.9rem;
            letter-spacing: 6px;
            color: var(--text-dim);
            animation: pulse-op 2s infinite;
        }

        @keyframes pulse-op {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* ===== MAIN CONTAINER ===== */
        #main-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 550px;
            padding: 20px;
            z-index: 10;
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #main-content.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* ===== PROFILE CARD - Semi-transparent ===== */
        .profile-card {
            background: var(--glass-bg);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .profile-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(212, 175, 55, 0.1);
        }

        /* Sweeping light ray */
        .profile-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transform: skewX(-20deg);
            animation: sweep 6s infinite;
        }

        @keyframes sweep {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* Profile Image */
        .img-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .img-wrapper::before,
        .img-wrapper::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--accent-gold), transparent, var(--accent-gold-light), transparent);
            animation: rotateGlow 4s linear infinite;
            z-index: -1;
            filter: blur(8px);
        }

        .img-wrapper::after {
            filter: blur(15px);
            opacity: 0.6;
        }

        @keyframes rotateGlow {
            100% { transform: rotate(360deg); }
        }

        .profile-img {
            width: 110px; height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 0, 0, 0.5);
        }

        /* Profile Name - Elegant */
        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light), var(--accent-gold));
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textShine 5s linear infinite;
        }

        .profile-bio {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Views Badge */
        .views-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ccc;
            margin-bottom: 20px;
        }

        .views-badge i {
            color: var(--accent-gold);
            text-shadow: 0 0 5px var(--accent-gold);
        }

        /* Discord Widget */
        .discord-widget {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .discord-widget:hover {
            background: rgba(20, 20, 20, 0.6);
            border-color: rgba(255, 255, 255, 0.12);
            transform: scale(1.02);
        }

        .dc-avatar {
            position: relative;
            width: 50px; height: 50px;
            flex-shrink: 0;
        }

        .dc-avatar img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .dc-status {
            position: absolute;
            bottom: 0; right: 0;
            width: 14px; height: 14px;
            background: #23a559;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.5);
            box-shadow: 0 0 8px #23a559;
        }

        .dc-info {
            display: flex;
            flex-direction: column;
        }

        .dc-display-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
        }

        .dc-username {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 300;
        }

        .dc-time {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            margin-top: 2px;
        }

        /* Social Buttons */
        .social-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .social-btn {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            color: #fff;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: var(--accent-gold);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
            filter: blur(10px);
        }

        .social-btn:hover {
            transform: translateY(-8px) scale(1.1);
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--accent-gold);
            color: #fff;
        }

        .social-btn:hover::before {
            opacity: 0.4;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 480px) {
            .enter-title {
                font-size: 2.2rem;
                letter-spacing: 10px;
            }

            #main-content {
                padding: 15px;
                max-width: 100%;
            }

            .profile-card {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }

            .profile-name {
                font-size: 2rem;
            }

            .volume-control {
                left: 10px;
            }

            .volume-btn {
                width: 34px; height: 34px;
                font-size: 0.75rem;
            }

            .volume-slider-wrap {
                height: 90px;
                width: 30px;
            }

            .volume-slider {
                height: 70px;
            }
        }

        @media (max-width: 360px) {
            .profile-name {
                font-size: 1.7rem;
                letter-spacing: 2px;
            }
        }
    </style>
</head>

<body>

    <!-- VIDEO BACKGROUND -->
    <video id="video-bg" muted playsinline preload="auto">
        <source src="assets/chipi.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <!-- VOLUME CONTROL -->
    <div id="volume-control" class="volume-control">
        <button class="volume-btn" id="vol-up" title="Subir volumen">
            <i class="fa-solid fa-volume-high"></i>
        </button>
        <div class="volume-slider-wrap">
            <input type="range" min="0" max="100" value="50" class="volume-slider" id="volume-slider">
        </div>
        <button class="volume-btn" id="vol-mute" title="Silenciar">
            <i class="fa-solid fa-volume-xmark" id="mute-icon"></i>
        </button>
    </div>

    <!-- ENTRY SCREEN -->
    <div id="entry-screen">
        <h1 class="enter-title">DIEGO GRAVITY</h1>
        <div class="enter-desc">[ CLICK TO INITIALIZE ]</div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content">

        <div class="profile-card">

            <div class="img-wrapper">
                <img src="assets/profile-avatar.png" alt="Profile" class="profile-img"
                    onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'150\' height=\'150\'><rect width=\'150\' height=\'150\' fill=\'%23111\'/></svg>'">
            </div>

            <h1 class="profile-name">CHIPI</h1>
            <div class="profile-bio">editor fracasado e inge</div>

            <div class="views-badge">
                <i class="fa-solid fa-eye"></i>
                <span id="views">32,902</span> VIEWS
            </div>

            <div class="discord-widget" id="discord-widget"
                onclick="window.open('https://discord.gg/Nmb9ccZFUf', '_blank')">
                <div class="dc-avatar">
                    <img src="assets/discord-chicken.png" alt="Discord"
                        onerror="this.src='https://via.placeholder.com/150/111/fff?text=DC'">
                    <div class="dc-status"></div>
                </div>
                <div class="dc-info">
                    <span class="dc-display-name">Anthony Smith</span>
                    <span class="dc-username">mamertocholito_98372</span>
                    <span class="dc-time">last seen 1 hour ago</span>
                </div>
            </div>

            <div class="social-grid">
                <a href="https://linktw.in/KAlHuM" target="_blank" class="social-btn social-link">
                    <i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.roblox.com/es/users/8047369809/profile" target="_blank" class="social-btn social-link">
                    <img src="assets/roblox-logo.svg" alt="Roblox"
                        style="width: 28px; height: 28px; object-fit: contain;"></a>
                <a href="https://linktw.in/zUykyi" target="_blank" class="social-btn social-link">
                    <i class="fa-brands fa-tiktok"></i></a>
            </div>

        </div>

    </div>

    <script>
        // ===== VIDEO + VOLUME LOGIC =====
        const video = document.getElementById('video-bg');
        const volSlider = document.getElementById('volume-slider');
        const volMuteBtn = document.getElementById('vol-mute');
        const muteIcon = document.getElementById('mute-icon');
        const volUpBtn = document.getElementById('vol-up');
        const volumeControl = document.getElementById('volume-control');
        let savedVolume = 0.5;

        // Set initial volume
        video.volume = 0.5;

        // Volume slider
        volSlider.addEventListener('input', (e) => {
            const vol = e.target.value / 100;
            video.volume = vol;
            video.muted = false;
            savedVolume = vol;
            updateMuteIcon();
        });

        // Volume up button
        volUpBtn.addEventListener('click', () => {
            let vol = Math.min(1, video.volume + 0.1);
            video.volume = vol;
            video.muted = false;
            volSlider.value = vol * 100;
            savedVolume = vol;
            updateMuteIcon();
        });

        // Mute toggle
        volMuteBtn.addEventListener('click', () => {
            if (video.muted || video.volume === 0) {
                video.muted = false;
                video.volume = savedVolume > 0 ? savedVolume : 0.5;
                volSlider.value = video.volume * 100;
            } else {
                savedVolume = video.volume;
                video.muted = true;
            }
            updateMuteIcon();
        });

        function updateMuteIcon() {
            if (video.muted || video.volume === 0) {
                muteIcon.className = 'fa-solid fa-volume-xmark';
            } else if (video.volume < 0.5) {
                muteIcon.className = 'fa-solid fa-volume-low';
            } else {
                muteIcon.className = 'fa-solid fa-volume-high';
            }
        }

        // Loop video
        video.addEventListener('ended', () => {
            video.currentTime = 0;
            video.play().catch(() => {});
        });

        // ===== ENTRY SCREEN LOGIC =====
        const entry = document.getElementById('entry-screen');

        entry.addEventListener('click', () => {
            entry.classList.add('open');
            // Start video with audio
            video.muted = false;
            video.play().then(() => {
                volumeControl.classList.add('visible');
                updateMuteIcon();
            }).catch(e => {
                // If autoplay with sound is blocked, play muted then unmute
                video.muted = true;
                video.play().then(() => {
                    volumeControl.classList.add('visible');
                    // Try unmuting after a moment
                    setTimeout(() => {
                        video.muted = false;
                        updateMuteIcon();
                    }, 100);
                }).catch(err => console.log("Video play failed", err));
            });

            setTimeout(() => {
                document.getElementById('main-content').classList.add('visible');
            }, 500);
        });

        // ===== PAUSE AUDIO ON SOCIAL LINK CLICK (MOBILE) =====
        document.querySelectorAll('.social-link, .discord-widget').forEach(link => {
            link.addEventListener('click', () => {
                // Pause video audio when navigating away
                video.pause();
            });
        });

        // Resume video when user comes back
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && entry.classList.contains('open')) {
                video.play().catch(() => {});
            } else if (document.visibilityState === 'hidden') {
                video.pause();
            }
        });

        // ===== PREVENT ZOOM & DRAG ON MOBILE =====
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // Prevent double-tap zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        // Prevent pinch zoom via gesture events
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('gesturechange', (e) => e.preventDefault());
        document.addEventListener('gestureend', (e) => e.preventDefault());
    </script>
</body>

</html>
